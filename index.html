<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能投资决策系统</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; margin: 0; background: #f5f7fb; color: #0f172a; }
    .app { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .card { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 8px 20px rgba(15,23,42,.06); margin-bottom: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    label { display: block; font-size: 13px; color: #334155; margin-bottom: 6px; }
    input, textarea, button { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
    textarea { min-height: 90px; resize: vertical; }
    button { cursor: pointer; background: #1d4ed8; border: none; color: #fff; font-weight: 600; }
    button.secondary { background: #475569; }
    button.inline { width: auto; padding: 8px 12px; }
    .hidden { display: none; }
    .steps { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .step-chip { background: #e2e8f0; color: #0f172a; padding: 6px 10px; border-radius: 999px; font-size: 12px; }
    .step-chip.active { background: #2563eb; color: #fff; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #f8fafc; padding: 10px; border-radius: 8px; overflow: auto; white-space: pre-wrap; }
    .history-item { border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
    .chart { width: 100%; height: 280px; }
    .json-block { max-height: 220px; overflow: auto; }
    @media (max-width: 900px) { .row, .row-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <h1>基于AI的多 Agent 智能投资决策系统</h1>

    <div id="authCard" class="card">
      <h3>登录 / 注册</h3>
      <div class="row">
        <div>
          <label>用户名</label>
          <input id="username" placeholder="例如 investor01" />
        </div>
        <div>
          <label>密码</label>
          <input id="password" type="password" placeholder="请输入密码" />
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="loginBtn">登录</button>
        <button id="registerBtn" class="secondary">注册</button>
      </div>
      <div id="authMsg" style="margin-top:8px;color:#b91c1c"></div>
    </div>

    <div id="mainArea" class="hidden">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
          <div>当前用户：<b id="currentUser"></b></div>
          <button id="logoutBtn" class="inline secondary">退出</button>
        </div>
        <div class="row" style="margin-top:10px;">
          <div>
            <label>Coze Workflow Token</label>
            <input id="workflowToken" type="password" placeholder="Bearer token (不含 Bearer 前缀)" />
          </div>
          <div>
            <label>用户输入画像文本</label>
            <textarea id="userInput">我今年25岁职场新人，年收入14万，每年8万可投资，偏好AI与教育，风险激进。</textarea>
          </div>
        </div>
        <button id="runBtn" style="margin-top:10px;">发送到工作流并保存结果</button>
      </div>

      <div class="card">
        <h3>历史记录（MySQL 5.7）</h3>
        <div id="historyList"></div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button id="prevHistory" class="inline secondary">上一页</button>
          <button id="nextHistory" class="inline secondary">下一页</button>
          <span id="historyPageInfo" style="line-height:32px;"></span>
        </div>
      </div>

      <div class="card">
        <h3>历史决策参数查看与复现</h3>
        <div id="recordMeta" class="mono">请选择一条历史记录后查看输入参数与输出参数。</div>
        <div class="row" style="margin-top:10px;">
          <div>
            <label>决策输入参数（user_input）</label>
            <div id="recordInput" class="mono json-block">暂无</div>
          </div>
          <div>
            <label>决策输出参数（workflow response）</label>
            <div id="recordOutput" class="mono json-block">暂无</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>流程分页展示</h3>
        <div class="steps" id="stepChips"></div>
        <div style="display:flex; gap:8px; margin-bottom:10px;">
          <button id="prevStep" class="inline secondary">上一步</button>
          <button id="nextStep" class="inline secondary">下一步</button>
          <span id="stepLabel" style="line-height:32px;"></span>
        </div>
        <div id="stepContent"></div>
      </div>
    </div>
  </div>

<script>
(() => {
  const state = {
    token: localStorage.getItem('sessionToken') || '',
    user: JSON.parse(localStorage.getItem('sessionUser') || 'null'),
    selected: null,
    stepIndex: 0,
    historyPage: 1,
    historyPageSize: 5,
    historyTotal: 0,
    history: [],
    selectedRecord: null
  };

  const steps = [
    '1️⃣ market_intelligence（市场情报）',
    '2️⃣ risk_calculation（风险计算）',
    '3️⃣ asset_allocation（资产配置）',
    '4️⃣ investment_calculator（投资计算）',
    '5️⃣ risk_assessment（风险评估）',
    '6️⃣ investment_strategy（投资策略）'
  ];

  const el = (id) => document.getElementById(id);
  const authCard = el('authCard');
  const mainArea = el('mainArea');

  function setAuthView() {
    const loggedIn = Boolean(state.token && state.user);
    authCard.classList.toggle('hidden', loggedIn);
    mainArea.classList.toggle('hidden', !loggedIn);
    if (loggedIn) {
      el('currentUser').textContent = state.user.username;
      loadHistory();
    }
  }

  function api(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (state.token) headers.Authorization = `Bearer ${state.token}`;
    return fetch(path, { ...options, headers });
  }

  async function auth(path) {
    const username = el('username').value.trim();
    const password = el('password').value;
    const msg = el('authMsg');
    msg.textContent = '';
    const resp = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok) {
      msg.textContent = data.error || '操作失败';
      return;
    }
    if (path.endsWith('/login')) {
      state.token = data.token;
      state.user = data.user;
      localStorage.setItem('sessionToken', state.token);
      localStorage.setItem('sessionUser', JSON.stringify(state.user));
      setAuthView();
    } else {
      msg.style.color = '#166534';
      msg.textContent = data.message;
    }
  }

  async function runWorkflow() {
    const workflow_token = el('workflowToken').value.trim();
    const user_input = el('userInput').value.trim();
    const resp = await api('/api/run', {
      method: 'POST',
      body: JSON.stringify({ workflow_token, user_input })
    });
    const data = await resp.json();
    if (!resp.ok) {
      alert(data.error || '调用失败');
      return;
    }
    state.selected = data.data;
    state.stepIndex = 0;
    renderStep();
    await loadHistory(1);
  }

  async function loadHistory(page = state.historyPage) {
    state.historyPage = page;
    const resp = await api(`/api/history?page=${page}&pageSize=${state.historyPageSize}`);
    const data = await resp.json();
    if (!resp.ok) {
      if (resp.status === 401) {
        doLogout();
        return;
      }
      alert(data.error || '加载历史失败');
      return;
    }
    state.history = data.items;
    state.historyTotal = data.total;
    renderHistory();
    if (!state.selectedRecord && state.history.length) loadRecord(state.history[0].id);
  }

  function renderHistory() {
    const list = el('historyList');
    list.innerHTML = '';
    state.history.forEach((item) => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<b>#${item.id}</b> ${new Date(item.created_at).toLocaleString()}<br/><small>${item.user_input.slice(0, 120)}</small><br/><small>workflow: ${item.workflow_url}</small> <small>token: ${item.token_mask || '-'}</small><br/>`;
      const btn = document.createElement('button');
      btn.className = 'inline';
      btn.textContent = '查看参数并复现六模块';
      btn.onclick = () => loadRecord(item.id);
      div.appendChild(btn);
      list.appendChild(div);
    });
    const totalPages = Math.max(Math.ceil(state.historyTotal / state.historyPageSize), 1);
    el('historyPageInfo').textContent = `第 ${state.historyPage} / ${totalPages} 页，共 ${state.historyTotal} 条`;
  }

  function get(obj, path, fallback = null) {
    return path.reduce((acc, k) => acc && acc[k] !== undefined ? acc[k] : null, obj) ?? fallback;
  }

  function renderChips() {
    const chips = el('stepChips');
    chips.innerHTML = '';
    steps.forEach((s, i) => {
      const span = document.createElement('span');
      span.className = `step-chip ${state.stepIndex === i ? 'active' : ''}`;
      span.textContent = s;
      span.onclick = () => { state.stepIndex = i; renderStep(); };
      chips.appendChild(span);
    });
  }

  function renderChart(containerId, option) {
    const node = document.getElementById(containerId);
    if (!node) return;
    const chart = echarts.init(node);
    chart.setOption(option);
  }

  function renderStep() {
    renderChips();
    el('stepLabel').textContent = steps[state.stepIndex];
    const data = state.selected || {};
    const c = el('stepContent');

    if (state.stepIndex === 0) {
      c.innerHTML = `
        <h4>市场情报报告</h4>
        <div class="mono">${(data.market_intelligence_report || '暂无').replace(/</g, '&lt;')}</div>
        <h4>市场实时数据</h4>
        <div class="mono">${JSON.stringify(data.market_realtime_data || {}, null, 2)}</div>`;
    } else if (state.stepIndex === 1) {
      c.innerHTML = `<h4>风险计算结果</h4><div class="mono">${JSON.stringify(data.risk_metrics || {}, null, 2)}</div>`;
    } else if (state.stepIndex === 2) {
      c.innerHTML = `
        <h4>资产配置模型</h4><div class="mono">${JSON.stringify(data.asset_allocation_model || {}, null, 2)}</div>
        <div id="pie" class="chart"></div>`;
      const pie = get(data, ['visualization_data', '资产配置饼图', '数据']);
      if (pie && pie.标签) {
        renderChart('pie', {
          tooltip: { trigger: 'item' },
          series: [{ type: 'pie', radius: ['40%', '70%'], data: pie.标签.map((n, i) => ({ name: n, value: pie.比例[i] })) }]
        });
      }
    } else if (state.stepIndex === 3) {
      c.innerHTML = `<h4>投资计算</h4><div class="mono">${JSON.stringify(data.investment_calculation || {}, null, 2)}</div><div id="line" class="chart"></div>`;
      const d = get(data, ['visualization_data', '定投收益曲线', '数据']);
      if (d && d.系列) {
        const len = d.系列[0]?.数据?.length || 0;
        renderChart('line', {
          tooltip: { trigger: 'axis' },
          legend: { data: d.系列.map(s => s.名称) },
          xAxis: { type: 'category', data: Array.from({length: len}, (_, i) => i + 1) },
          yAxis: { type: 'value' },
          series: d.系列.map(s => ({ type: 'line', smooth: true, name: s.名称, data: s.数据 }))
        });
      }
    } else if (state.stepIndex === 4) {
      c.innerHTML = `<h4>风险评估报告</h4><div class="mono">${(data.risk_assessment_report || '暂无').replace(/</g, '&lt;')}</div>`;
    } else {
      c.innerHTML = `<h4>投资策略建议</h4><div class="mono">${(data.investment_advice || '暂无').replace(/</g, '&lt;')}</div>`;
    }
  }

  function renderRecordParams() {
    const record = state.selectedRecord;
    if (!record) return;
    el('recordMeta').textContent = `记录ID: ${record.id} | 时间: ${new Date(record.created_at).toLocaleString()} | 工作流: ${record.workflow_url} | Token: ${record.token_mask || '-'}`;
    el('recordInput').textContent = record.user_input || '';
    el('recordOutput').textContent = JSON.stringify(record.response || {}, null, 2);
  }

  async function loadRecord(id) {
    const resp = await api(`/api/history/${id}`);
    const data = await resp.json();
    if (!resp.ok) {
      alert(data.error || '加载记录详情失败');
      return;
    }
    state.selectedRecord = data;
    state.selected = data.response;
    state.stepIndex = 0;
    renderRecordParams();
    renderStep();
  }

  function doLogout() {
    state.token = '';
    state.user = null;
    state.history = [];
    state.selected = null;
    state.selectedRecord = null;
    localStorage.removeItem('sessionToken');
    localStorage.removeItem('sessionUser');
    setAuthView();
  }

  el('loginBtn').onclick = () => auth('/api/auth/login');
  el('registerBtn').onclick = () => auth('/api/auth/register');
  el('logoutBtn').onclick = async () => {
    await api('/api/auth/logout', { method: 'POST' });
    doLogout();
  };
  el('runBtn').onclick = runWorkflow;
  el('prevHistory').onclick = () => { if (state.historyPage > 1) loadHistory(state.historyPage - 1); };
  el('nextHistory').onclick = () => {
    const totalPages = Math.max(Math.ceil(state.historyTotal / state.historyPageSize), 1);
    if (state.historyPage < totalPages) loadHistory(state.historyPage + 1);
  };
  el('prevStep').onclick = () => { state.stepIndex = (state.stepIndex + steps.length - 1) % steps.length; renderStep(); };
  el('nextStep').onclick = () => { state.stepIndex = (state.stepIndex + 1) % steps.length; renderStep(); };

  setAuthView();
})();
</script>
</body>
</html>
