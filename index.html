<!DOCTYPE html>
<html lang="zh">
<head>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f4f7fc;
            color: #1e293b;
            padding: 24px 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(145deg, #0f2b4d, #1e4a6f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.01em;
        }

        .header i {
            font-size: 2.2rem;
            color: #2c5f8a;
        }

        /* 输入卡片 */
        .input-card {
            background: white;
            border-radius: 28px;
            padding: 24px 28px;
            box-shadow: 0 20px 35px -8px rgba(0, 32, 64, 0.12);
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(2px);
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1 1 260px;
        }

        .input-field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #5e6f8d;
            margin-bottom: 6px;
        }

        .input-field input, .input-field textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #dde3ed;
            border-radius: 24px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #f9fcff;
            font-family: inherit;
        }

        .input-field input:focus, .input-field textarea:focus {
            outline: none;
            border-color: #3a7ca5;
            box-shadow: 0 0 0 4px rgba(58,124,165,0.15);
            background: white;
        }

        .input-field textarea {
            min-height: 90px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #1e4a6f;
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 34px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 16px -6px #1e4a6f70;
            border: 1px solid #ffffff30;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn i {
            font-size: 1.1rem;
        }

        .btn:hover {
            background: #143b57;
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -8px #0f2b4d;
        }

        .btn-outline {
            background: transparent;
            box-shadow: none;
            color: #1e4a6f;
            border: 1px solid #b4c8db;
        }

        .btn-outline:hover {
            background: #e6f0fa;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #edf2f9;
            padding: 8px 20px;
            border-radius: 40px;
            color: #2b4f6e;
            font-weight: 500;
        }

        .loading i {
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 网格卡片布局 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 22px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 22px 24px;
            box-shadow: 0 12px 30px -8px rgba(18, 45, 74, 0.08);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.15s;
            backdrop-filter: blur(2px);
            background: rgba(255,255,255,0.85);
        }

        .card:hover {
            box-shadow: 0 24px 44px -12px rgba(18, 67, 112, 0.18);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 12px;

            font-size: 1.6rem;
            color: #3679b5;
            background: #e4eff9;
            padding: 10px;
            border-radius: 18px;
        }

        .card-header h3 {
            font-weight: 600;
            font-size: 1.3rem;
            color: #0b2a44;
        }

        .col-span-3 { grid-column: span 3; }
        .col-span-4 { grid-column: span 4; }
        .col-span-5 { grid-column: span 5; }
        .col-span-6 { grid-column: span 6; }
        .col-span-7 { grid-column: span 7; }
        .col-span-8 { grid-column: span 8; }
        .col-span-9 { grid-column: span 9; }
        .col-span-12 { grid-column: span 12; }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .col-span-3, .col-span-4, .col-span-5, .col-span-6, .col-span-7, .col-span-8, .col-span-9, .col-span-12 {
                grid-column: span 1;
            }
        }

        .profile-tag {
            display: inline-block;
            background: #e7f1fa;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.9rem;
            margin: 4px 6px 4px 0;
            color: #1f4e7a;
        }

        .key-metric {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #e9eef3;
            padding: 12px 0;
        }

        .metric-label {
            color: #4a607a;
            font-weight: 500;
        }

        .metric-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1a3f60;
        }

        .advice-text {
            background: #f1f7fd;
            border-radius: 22px;
            padding: 18px 22px;
            white-space: pre-wrap;
            font-size: 0.95rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #c7ddec;
        }

        .table-mini {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .table-mini td {
            padding: 8px 4px;
            border-bottom: 1px solid #ecf1f7;
        }

        .table-mini tr:last-child td {
            border: none;
        }

        .badge {
            background: #d1e3f5;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #164863;
        }

        .chart-container {
            width: 100%;
            height: 260px;
            margin-top: 6px;
        }

        .small-chart {
            height: 200px;
        }

        .footer-note {
            margin-top: 40px;
            text-align: center;
            color: #6f85a0;
            font-size: 0.9rem;
        }

</head>

        // 调用API
        async function fetchData(token, userText) {
            const url = 'http://localhost:3000/api/run';
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_input: userText })
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch (e) {
                alert('请求失败：' + e.message + '。请检查网络、token或CORS，现在加载示例数据。');
                return SAMPLE_RESPONSE; // 降级使用示例
            }
        }

        // 事件绑定
        fetchBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            const text = userInput.value.trim();
            if (!token || !text) {
                alert('请填写Token和用户描述');
                return;
            }
            loadingEl.style.display = 'flex';
            dashboardEl.innerHTML = ''; // 清空
            try {
                const data = await fetchData(token, text);
                renderDashboard(data);
            } catch (e) {
                alert('处理出错，使用示例数据');
                renderDashboard(SAMPLE_RESPONSE);
            } finally {
                loadingEl.style.display = 'none';
            }
        });

        sampleBtn.addEventListener('click', () => {
            renderDashboard(SAMPLE_RESPONSE);
        });

        // 初始加载示例，让页面美观
        window.addEventListener('load', () => {
            renderDashboard(SAMPLE_RESPONSE);
        });
