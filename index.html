<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能投资决策系统</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f4f7ff 0%, #eef3ff 100%);
      color: #172b4d;
    }
    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar {
      background: #f7f9ff;
      border-right: 1px solid #dce5ff;
      padding: 20px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .brand {
      border-radius: 16px;
      padding: 16px;
      background: #ffffff;
      border: 1px solid #dde6ff;
      box-shadow: 0 6px 18px rgba(42, 88, 170, .08);
      margin-bottom: 14px;
    }
    .brand h2 { margin: 4px 0 8px; font-size: 34px; color: #2d5bdb; }
    .brand p { margin: 0; color: #597299; }
    .menu button {
      width: 100%;
      margin: 8px 0;
      padding: 10px 12px;
      border: 1px solid #d5dfff;
      border-radius: 12px;
      background: #fff;
      color: #2a3f70;
      cursor: pointer;
      text-align: left;
      font-weight: 600;
    }
    .menu button.active {
      background: linear-gradient(135deg, #3869f6, #4d8cff);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 20px rgba(53, 108, 237, .28);
    }
    .main { padding: 18px; }
    .panel {
      background: #fff;
      border: 1px solid #dde6ff;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(52, 89, 167, .1);
      padding: 16px;
      margin-bottom: 14px;
    }
    .hero {
      background: linear-gradient(120deg, #3d67dd, #4f8ceb);
      color: #fff;
      border: none;
    }
    .hero h1 { margin: 6px 0 10px; font-size: 38px; }
    .hero p { margin: 0 0 12px; opacity: .95; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .kpi {
      padding: 14px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #dce7ff;
    }
    .kpi b { display: block; font-size: 28px; color: #1b376f; margin-top: 4px; }
    .kpi span { color: #56b177; font-weight: 600; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .chart { width: 100%; height: 300px; }
    .chart-sm { width: 100%; height: 240px; }
    label { display: block; margin-bottom: 6px; color: #35507f; font-weight: 600; }
    input, textarea, button, select {
      width: 100%;
      border: 1px solid #ccd9fc;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
      color: #1e3768;
    }
    textarea { min-height: 90px; resize: vertical; }
    button.primary {
      background: linear-gradient(135deg, #3869f6, #4f8ceb);
      color: #fff;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #eff4ff; cursor: pointer; }
    .hidden { display: none !important; }
    .auth-wrap { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; }
    .tip-list li { margin: 8px 0; }
    .pill { display:inline-block; background:#e9f0ff; color:#3458a3; border-radius:999px; padding:4px 10px; margin:4px 6px 0 0; font-size:12px; }
    .timeline { border-left: 3px solid #dbe6ff; padding-left: 10px; }
    .timeline-item { margin-bottom: 10px; }
    .timeline-item b { color: #2d56b5; }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .row, .row-3, .kpi-grid, .auth-wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div style="letter-spacing:2px;color:#5f7fcf;font-size:12px;">INVESTMENT PORTAL</div>
        <h2>投资驾驶舱</h2>
        <p>亮色管理中台风格 · 图表驱动总览与模块分页</p>
      </div>
      <div id="menu" class="menu"></div>
    </aside>

    <main class="main">
      <section id="authCard" class="panel">
        <div class="auth-wrap">
          <div class="panel hero">
            <div style="font-size:13px;opacity:.85">智能投资协同平台</div>
            <h1>六模块决策闭环看板</h1>
            <p>从市场情报到投资策略，统一图表化呈现，减少 JSON 噪音，提升管理可读性。</p>
            <div class="row-3">
              <div class="kpi"><div>模块数量</div><b>6</b><span>实时</span></div>
              <div class="kpi"><div>默认演示数据</div><b>1</b><span>可用</span></div>
              <div class="kpi"><div>历史复现</div><b>分页</b><span>支持</span></div>
            </div>
          </div>
          <div class="panel">
            <h3>登录系统</h3>
            <label>用户名</label>
            <input id="username" placeholder="例如 investor01" />
            <label style="margin-top:8px;">密码</label>
            <input id="password" type="password" placeholder="请输入密码" />
            <div class="row" style="margin-top:10px;">
              <button id="loginBtn" class="primary">登录</button>
              <button id="registerBtn" class="secondary">注册</button>
            </div>
            <div id="authMsg" style="color:#c83a3a;margin-top:10px;"></div>
          </div>
        </div>
      </section>

      <section id="mainArea" class="hidden">
        <section class="panel hero">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
            <div>
              <div style="font-size:13px;opacity:.85">系统治理与资产协同</div>
              <h1 style="margin:4px 0;font-size:34px;">管理驾驶舱</h1>
              <p>当前用户：<b id="currentUser"></b> · 顶部画像在所有模块页统一展示</p>
            </div>
            <button id="logoutBtn" class="secondary" style="width:auto;padding:8px 14px;">退出登录</button>
          </div>
          <div id="profilePills"></div>
        </section>

        <section id="view-overview" class="panel view"></section>
        <section id="view-history" class="panel view hidden"></section>
        <section id="view-module" class="panel view hidden"></section>
      </section>
    </main>
  </div>

<script>
(() => {
  const DEFAULT_DATA = {
    investment_advice: '建议激进型投资者采用“核心指数 + 成长行业 + 风险再平衡”策略。',
    user_profile: {
      basic: { age_group: '25-35', investable_assets: 80000, asset_currency: 'CNY' },
      goal: { specific_goal: '资产增值', investment_horizon: '长期（3年以上）', expected_return: '追求高收益>10%' },
      risk_tolerance: { risk_level: '激进型', max_loss_acceptance: '>20%' },
      preferences: { preferred_sectors: ['教育', 'AI'] }
    },
    market_intelligence_report: '市场情绪中性偏积极，成长行业仍具备机会但波动较大。',
    market_realtime_data: { 宏观经济: [{ 标题: '全年经济向新向优', 来源: '财经媒体' }] },
    risk_metrics: { 风险等级: '激进型', VaR_95: { 单日: -0.026, 年度: -0.41 }, 夏普比率: 0.9, 信息比率: 0.4 },
    risk_assessment_report: '整体风险等级中等偏高，与激进型画像匹配。',
    asset_allocation_model: {
      配置比例: { 股票类: 0.8, 债券类: 0.1, 现金及等价物: 0.05, 另类投资: 0.05 },
      详细配置: { 沪深300指数基金: 0.304, 中证500指数基金: 0.248, 创业板ETF: 0.152, 科技ETF: 0.08, 新能源ETF: 0.016, 信用债基金: 0.1, 货币市场基金: 0.05, 黄金ETF: 0.05 }
    },
    investment_calculation: {
      复利计算: { 初始投资: 80000, 期末价值: 128840.8, 总收益率: 61.05 },
      不同情景分析: [
        { 情景: '悲观', 总收益率: 27.63 },
        { 情景: '基准', 总收益率: 61.05 },
        { 情景: '乐观', 总收益率: 101.14 }
      ]
    },
    visualization_data: {
      资产配置饼图: { 数据: { 标签: ['沪深300', '中证500', '创业板', '科技', '新能源', '信用债', '货币', '黄金'], 比例: [30.4, 24.8, 15.2, 8, 1.6, 10, 5, 5] } },
      定投收益曲线: { 数据: { 系列: [
        { 名称: '累计投入', 数据: [1333, 2667, 4000, 5333, 6667, 8000] },
        { 名称: '累计价值', 数据: [1333, 2678, 4033, 5400, 6779, 8169] }
      ] } }
    }
  };

  const PAGES = [
    { id: 'overview', label: '驾驶舱总览' },
    { id: 'history', label: '历史趋势分页' },
    { id: 'm1', label: '模块1 市场情报' },
    { id: 'm2', label: '模块2 风险计算' },
    { id: 'm3', label: '模块3 资产配置' },
    { id: 'm4', label: '模块4 投资计算' },
    { id: 'm5', label: '模块5 风险评估' },
    { id: 'm6', label: '模块6 投资策略' }
  ];

  const state = {
    token: localStorage.getItem('sessionToken') || '',
    user: JSON.parse(localStorage.getItem('sessionUser') || 'null'),
    currentPage: 'overview',
    selected: DEFAULT_DATA,
    selectedRecord: null,
    history: [],
    historyPage: 1,
    historyPageSize: 5,
    historyTotal: 0
  };

  const el = (id) => document.getElementById(id);
  const authCard = el('authCard');
  const mainArea = el('mainArea');

  function api(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (state.token) headers.Authorization = `Bearer ${state.token}`;
    return fetch(path, { ...options, headers });
  }

  function get(obj, path, fallback = null) {
    return path.reduce((acc, k) => (acc && acc[k] !== undefined ? acc[k] : null), obj) ?? fallback;
  }

  function initChart(id, option) {
    const dom = document.getElementById(id);
    if (!dom) return;
    echarts.init(dom).setOption(option);
  }

  function renderMenu() {
    const menu = el('menu');
    menu.innerHTML = '';
    PAGES.forEach((p) => {
      const btn = document.createElement('button');
      btn.textContent = p.label;
      if (p.id === state.currentPage) btn.classList.add('active');
      btn.onclick = () => switchPage(p.id);
      menu.appendChild(btn);
    });
  }

  function renderProfile() {
    const p = state.selected?.user_profile || {};
    const items = [
      `年龄段：${get(p, ['basic', 'age_group'], '-')}`,
      `可投资产：${get(p, ['basic', 'investable_assets'], '-')} ${get(p, ['basic', 'asset_currency'], '')}`,
      `目标：${get(p, ['goal', 'specific_goal'], '-')}`,
      `收益预期：${get(p, ['goal', 'expected_return'], '-')}`,
      `风险等级：${get(p, ['risk_tolerance', 'risk_level'], '-')}`,
      `偏好行业：${(get(p, ['preferences', 'preferred_sectors'], []) || []).join('、') || '-'}`
    ];
    el('profilePills').innerHTML = items.map(x => `<span class="pill">${x}</span>`).join('');
  }

  function switchPage(pageId) {
    state.currentPage = pageId;
    renderMenu();
    el('view-overview').classList.toggle('hidden', pageId !== 'overview');
    el('view-history').classList.toggle('hidden', pageId !== 'history');
    el('view-module').classList.toggle('hidden', !pageId.startsWith('m'));
    if (pageId === 'overview') renderOverview();
    if (pageId === 'history') renderHistoryPage();
    if (pageId.startsWith('m')) renderModule(pageId);
  }

  async function auth(path) {
    const username = el('username').value.trim();
    const password = el('password').value;
    const resp = await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const data = await resp.json();
    if (!resp.ok) { el('authMsg').textContent = data.error || '操作失败'; return; }
    if (path.endsWith('/login')) {
      state.token = data.token;
      state.user = data.user;
      localStorage.setItem('sessionToken', state.token);
      localStorage.setItem('sessionUser', JSON.stringify(state.user));
      setAuthView();
      return;
    }
    el('authMsg').style.color = '#2c9f58';
    el('authMsg').textContent = data.message;
  }

  async function runWorkflow() {
    const workflow_token = el('workflowToken').value.trim();
    const user_input = el('userInput').value.trim();
    const resp = await api('/api/run', { method: 'POST', body: JSON.stringify({ workflow_token, user_input }) });
    const data = await resp.json();
    if (!resp.ok) return alert(data.error || '调用失败');
    state.selected = data.data || DEFAULT_DATA;
    state.selectedRecord = null;
    renderProfile();
    renderOverview();
    loadHistory(1);
  }

  async function loadHistory(page = state.historyPage) {
    state.historyPage = page;
    const resp = await api(`/api/history?page=${page}&pageSize=${state.historyPageSize}`);
    const data = await resp.json();
    if (!resp.ok) {
      if (resp.status === 401) return doLogout();
      return alert(data.error || '历史加载失败');
    }
    state.history = data.items || [];
    state.historyTotal = data.total || 0;
    if (!state.selectedRecord && state.history.length) loadRecord(state.history[0].id, false);
    if (state.currentPage === 'history') renderHistoryPage();
  }

  async function loadRecord(id, jumpModule) {
    const resp = await api(`/api/history/${id}`);
    const data = await resp.json();
    if (!resp.ok) return alert(data.error || '详情加载失败');
    state.selectedRecord = data;
    state.selected = data.response || DEFAULT_DATA;
    renderProfile();
    if (jumpModule) switchPage('m1');
    if (state.currentPage === 'history') renderHistoryPage();
  }

  function renderOverview() {
    const data = state.selected || DEFAULT_DATA;
    const rates = get(data, ['investment_calculation', '不同情景分析'], []);
    const riskMap = { 保守型: 20, 稳健型: 45, 平衡型: 60, 激进型: 82 };
    const riskLevel = get(data, ['risk_metrics', '风险等级'], get(data, ['user_profile', 'risk_tolerance', 'risk_level'], '平衡型'));
    const riskValue = riskMap[riskLevel] || 60;

    el('view-overview').innerHTML = `
      <h3>总览图表（替代 JSON 展示）</h3>
      <div class="row">
        <div>
          <label>Coze Workflow Token</label>
          <input id="workflowToken" type="password" placeholder="Bearer token（不含 Bearer 前缀）" />
        </div>
        <div>
          <label>用户画像输入</label>
          <textarea id="userInput">我今年25岁职场新人，年收入14万，每年8万可投资，偏好AI与教育，风险激进。</textarea>
        </div>
      </div>
      <button id="runBtn" class="primary" style="margin-top:10px;">发送到工作流并更新图表</button>

      <div class="kpi-grid" style="margin-top:12px;">
        <div class="kpi"><div>预期收益率（5年）</div><b>${get(data, ['investment_calculation', '复利计算', '总收益率'], 0)}%</b><span>模型计算</span></div>
        <div class="kpi"><div>可投资产</div><b>${get(data, ['user_profile', 'basic', 'investable_assets'], '-')}</b><span>CNY</span></div>
        <div class="kpi"><div>风险等级</div><b>${riskLevel}</b><span>评估结果</span></div>
        <div class="kpi"><div>建议模块数</div><b>6</b><span>闭环</span></div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div class="panel"><h4>情景收益对比</h4><div id="overviewScenario" class="chart-sm"></div></div>
        <div class="panel"><h4>风险承受仪表盘</h4><div id="overviewRiskGauge" class="chart-sm"></div></div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div class="panel"><h4>资产大类配置</h4><div id="overviewAssetPie" class="chart"></div></div>
        <div class="panel"><h4>模块跳转</h4>
          <div class="row-3">
            <button class="secondary" data-jump="m1">市场情报</button>
            <button class="secondary" data-jump="m2">风险计算</button>
            <button class="secondary" data-jump="m3">资产配置</button>
            <button class="secondary" data-jump="m4">投资计算</button>
            <button class="secondary" data-jump="m5">风险评估</button>
            <button class="secondary" data-jump="m6">投资策略</button>
          </div>
        </div>
      </div>
    `;

    el('runBtn').onclick = runWorkflow;
    el('view-overview').querySelectorAll('[data-jump]').forEach((btn) => btn.onclick = () => switchPage(btn.dataset.jump));

    initChart('overviewScenario', {
      tooltip: { trigger: 'axis' },
      xAxis: { type: 'category', data: rates.map(i => i.情景 || '-') },
      yAxis: { type: 'value', axisLabel: { formatter: '{value}%' } },
      series: [{ type: 'bar', data: rates.map(i => i.总收益率 || 0), itemStyle: { color: '#4f8ceb' } }]
    });

    initChart('overviewRiskGauge', {
      series: [{
        type: 'gauge',
        min: 0, max: 100,
        axisLine: { lineStyle: { width: 16, color: [[0.4, '#77d389'], [0.7, '#f6c556'], [1, '#ea6b6b']] } },
        detail: { formatter: `{value}\n${riskLevel}`, color: '#2d4e95' },
        data: [{ value: riskValue }]
      }]
    });

    const pie = get(data, ['asset_allocation_model', '配置比例'], {});
    initChart('overviewAssetPie', {
      tooltip: { trigger: 'item' },
      series: [{ type: 'pie', radius: ['35%', '70%'], data: Object.keys(pie).map(k => ({ name: k, value: Math.round((pie[k] || 0) * 100) })) }]
    });
  }

  function renderHistoryPage() {
    const pages = Math.max(Math.ceil(state.historyTotal / state.historyPageSize), 1);
    const list = state.history;
    el('view-history').innerHTML = `
      <h3>历史趋势分页（图表化）</h3>
      <div class="row">
        <div class="panel">
          <h4>当前分页命中记录</h4>
          <div id="historyBar" class="chart"></div>
          <div style="margin-top:8px;display:flex;gap:8px;">
            <button id="prevHistory" class="secondary">上一页</button>
            <button id="nextHistory" class="secondary">下一页</button>
            <span style="line-height:38px;">第 ${state.historyPage}/${pages} 页，共 ${state.historyTotal} 条</span>
          </div>
        </div>
        <div class="panel">
          <h4>分页结构分布</h4>
          <div id="historyPagePie" class="chart"></div>
        </div>
      </div>
      <div class="panel">
        <h4>历史复现入口（点击下方时间点）</h4>
        <div class="timeline" id="historyTimeline"></div>
      </div>
    `;

    const labels = list.map(i => `#${i.id}`);
    const values = list.map(i => (i.user_input || '').length || 1);

    initChart('historyBar', {
      tooltip: { trigger: 'axis' },
      xAxis: { type: 'category', data: labels },
      yAxis: { type: 'value', name: '输入长度' },
      series: [{ type: 'bar', data: values, itemStyle: { color: '#5f8fff' } }]
    });

    initChart('historyPagePie', {
      series: [{
        type: 'pie',
        radius: ['45%', '72%'],
        data: [
          { name: '当前页记录数', value: list.length },
          { name: '其余记录数', value: Math.max(state.historyTotal - list.length, 0) }
        ]
      }]
    });

    const timeline = el('historyTimeline');
    timeline.innerHTML = list.map(i => `<div class="timeline-item"><b>${new Date(i.created_at).toLocaleString()}</b> · 记录 #${i.id} <button style="width:auto;margin-left:8px;" data-id="${i.id}">复现并进入模块1</button></div>`).join('');
    timeline.querySelectorAll('button[data-id]').forEach((btn) => btn.onclick = () => loadRecord(Number(btn.dataset.id), true));

    el('prevHistory').onclick = () => { if (state.historyPage > 1) loadHistory(state.historyPage - 1); };
    el('nextHistory').onclick = () => { if (state.historyPage < pages) loadHistory(state.historyPage + 1); };
  }

  function renderModule(pageId) {
    const n = Number(pageId.slice(1));
    const data = state.selected || DEFAULT_DATA;
    const view = el('view-module');

    if (n === 1) {
      view.innerHTML = `<h3>模块1 市场情报</h3><div class="row"><div class="panel"><h4>情报来源分布</h4><div id="m1Source" class="chart"></div></div><div class="panel"><h4>市场情报摘要</h4><p>${data.market_intelligence_report || '暂无'}</p></div></div>`;
      const items = get(data, ['market_realtime_data', '宏观经济'], []);
      const srcCount = {};
      items.forEach(i => { srcCount[i.来源 || '未知'] = (srcCount[i.来源 || '未知'] || 0) + 1; });
      initChart('m1Source', { series: [{ type: 'pie', radius: '65%', data: Object.keys(srcCount).map(k => ({ name: k, value: srcCount[k] })) }] });
    } else if (n === 2) {
      view.innerHTML = `<h3>模块2 风险计算</h3><div class="row"><div class="panel"><h4>VaR 与收益质量</h4><div id="m2Risk" class="chart"></div></div><div class="panel"><h4>风险结论</h4><div class="kpi-grid"><div class="kpi"><div>风险等级</div><b>${get(data,['risk_metrics','风险等级'],'-')}</b><span>评估</span></div><div class="kpi"><div>夏普比率</div><b>${get(data,['risk_metrics','夏普比率'],'-')}</b><span>效率</span></div><div class="kpi"><div>信息比率</div><b>${get(data,['risk_metrics','信息比率'],'-')}</b><span>超额能力</span></div><div class="kpi"><div>年VaR95</div><b>${get(data,['risk_metrics','VaR_95','年度'],'-')}</b><span>风控</span></div></div></div></div>`;
      initChart('m2Risk', {
        xAxis: { type: 'category', data: ['单日VaR95', '年度VaR95', '夏普比率', '信息比率'] },
        yAxis: { type: 'value' },
        series: [{ type: 'bar', data: [Math.abs(get(data,['risk_metrics','VaR_95','单日'],0)), Math.abs(get(data,['risk_metrics','VaR_95','年度'],0)), get(data,['risk_metrics','夏普比率'],0), get(data,['risk_metrics','信息比率'],0)], itemStyle: { color: '#4f8ceb' } }]
      });
    } else if (n === 3) {
      view.innerHTML = `<h3>模块3 资产配置</h3><div class="row"><div class="panel"><h4>资产配置环图</h4><div id="m3Pie" class="chart"></div></div><div class="panel"><h4>细分资产权重</h4><div id="m3Bar" class="chart"></div></div></div>`;
      const d = get(data,['visualization_data','资产配置饼图','数据'], null);
      initChart('m3Pie', { series: [{ type: 'pie', radius: ['35%','70%'], data: (d?.标签 || []).map((x,i) => ({ name:x, value:d.比例[i] })) }] });
      initChart('m3Bar', { xAxis: { type:'category', data: d?.标签 || [] }, yAxis: { type:'value' }, series: [{ type:'bar', data: d?.比例 || [], itemStyle: { color:'#5a8fff' } }] });
    } else if (n === 4) {
      view.innerHTML = `<h3>模块4 投资计算</h3><div class="row"><div class="panel"><h4>定投曲线</h4><div id="m4Line" class="chart"></div></div><div class="panel"><h4>情景收益率</h4><div id="m4Scene" class="chart"></div></div></div>`;
      const series = get(data,['visualization_data','定投收益曲线','数据','系列'], []);
      const len = series[0]?.数据?.length || 0;
      initChart('m4Line', { tooltip: { trigger:'axis' }, legend: { data: series.map(s=>s.名称) }, xAxis: { type:'category', data: Array.from({length:len},(_,i)=>i+1) }, yAxis: { type:'value' }, series: series.map(s=>({ type:'line', smooth:true, name:s.名称, data:s.数据 })) });
      const scene = get(data,['investment_calculation','不同情景分析'], []);
      initChart('m4Scene', { xAxis: { type:'category', data: scene.map(i=>i.情景) }, yAxis: { type:'value' }, series: [{ type:'bar', data: scene.map(i=>i.总收益率), itemStyle: { color:'#6e9fff' } }] });
    } else if (n === 5) {
      view.innerHTML = `<h3>模块5 风险评估</h3><div class="row"><div class="panel"><h4>风险评估文本</h4><p>${data.risk_assessment_report || '暂无'}</p></div><div class="panel"><h4>风险等级位置</h4><div id="m5Gauge" class="chart"></div></div></div>`;
      const level = get(data,['risk_metrics','风险等级'], '平衡型');
      const map = { 保守型: 25, 稳健型: 45, 平衡型: 60, 激进型: 82 };
      initChart('m5Gauge', { series:[{ type:'gauge', min:0, max:100, detail:{ formatter: `{value}\n${level}` }, data:[{ value: map[level] || 60 }] }] });
    } else {
      view.innerHTML = `<h3>模块6 投资策略</h3><div class="row"><div class="panel"><h4>策略建议</h4><p>${data.investment_advice || '暂无'}</p></div><div class="panel"><h4>策略权重矩阵</h4><div id="m6Radar" class="chart"></div></div></div>`;
      initChart('m6Radar', {
        radar: { indicator: [{ name:'收益目标', max:100 },{ name:'风险承受', max:100 },{ name:'流动性', max:100 },{ name:'行业集中', max:100 },{ name:'执行稳定', max:100 }] },
        series: [{ type:'radar', data:[{ value:[85, 80, 45, 72, 68], name:'策略评分' }] }]
      });
    }
  }

  function setAuthView() {
    const ok = Boolean(state.token && state.user);
    authCard.classList.toggle('hidden', ok);
    mainArea.classList.toggle('hidden', !ok);
    if (!ok) return;
    el('currentUser').textContent = state.user.username;
    renderProfile();
    renderMenu();
    switchPage(state.currentPage);
    loadHistory();
  }

  function doLogout() {
    state.token = '';
    state.user = null;
    localStorage.removeItem('sessionToken');
    localStorage.removeItem('sessionUser');
    setAuthView();
  }

  el('loginBtn').onclick = () => auth('/api/auth/login');
  el('registerBtn').onclick = () => auth('/api/auth/register');
  el('logoutBtn').onclick = async () => { await api('/api/auth/logout', { method:'POST' }); doLogout(); };

  setAuthView();
})();
</script>
</body>
</html>
