<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基于AI的多agent智能投资决策系统</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f3f4f6; color: #1f2937; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
    .sidebar { background: #fff; border-right: 1px solid #e5e7eb; padding: 18px 12px; }
    .logo { font-size: 18px; font-weight: 800; line-height: 1.35; margin-bottom: 18px; }
    .tab-btn { width: 100%; text-align: left; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; color: #374151; font-weight: 600; }
    .tab-btn.active { background: #f9fafb; border-color: #d1d5db; }
    .main { padding: 16px 20px 24px; }
    .title { font-size: 40px; margin: 0 0 12px; color: #1e3a5f; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 14px; margin-bottom: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    label { display: block; margin-bottom: 6px; color: #6b7280; font-size: 13px; font-weight: 600; }
    input, textarea, button { width: 100%; border: 1px solid #d1d5db; border-radius: 10px; padding: 10px; font-size: 14px; background:#fff; }
    textarea { min-height: 86px; resize: vertical; }
    button { cursor: pointer; font-weight: 700; }
    .primary { background: #1f3f66; color: #fff; }
    .secondary { background: #fff; color: #374151; }
    .mini { font-size: 12px; color: #6b7280; }
    .value-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eef2f7; }
    .value-row:last-child { border-bottom: none; }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; background:#f3f4f6; margin:0 6px 6px 0; font-size:12px; }
    .chart { width: 100%; height: 280px; }
    .chart-sm { width: 100%; height: 220px; }
    .hidden { display:none !important; }
    .report { line-height: 1.8; white-space: pre-wrap; color: #334155; }
    .history-item { padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 8px; }
    @media (max-width: 1080px) { .layout { grid-template-columns: 1fr; } .row,.row-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">智能投资决策系统</div>
    <div id="tabList"></div>
  </aside>
  <main class="main">
    <h1 class="title">基于AI的多agent智能投资决策系统</h1>
    <section id="page1" class="page card"></section>
    <section id="page2" class="page card hidden"></section>
    <section id="page3" class="page card hidden"></section>
    <section id="page4" class="page card hidden"></section>
    <section id="page5" class="page card hidden"></section>
  </main>
</div>

<script src="/app.js" defer></script>

</body>
</html>
